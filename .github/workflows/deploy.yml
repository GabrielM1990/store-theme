name: Deploy VTEX Theme

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      workspace:
        description: 'VTEX Workspace to deploy to'
        required: true
        default: 'master'
        type: choice
        options:
          - master
          - customlanding
          - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install VTEX Toolbelt
        run: npm install -g vtex@latest

      - name: Login to VTEX
        uses: vtex/action-toolbelt@v3
        with:
          account: ${{ secrets.VTEX_ACCOUNT }}
          appKey: ${{ secrets.VTEX_APP_KEY }}
          appToken: ${{ secrets.VTEX_APP_TOKEN }}
          workspace: ${{ github.event.inputs.workspace || 'master' }}
          authenticate: true

      - name: Deploy to workspace
        run: |
          echo "Deploying to workspace: ${{ github.event.inputs.workspace || 'master' }}"
          vtex deploy --yes
