name: Deploy VTEX Theme

on:
  push:
    branches: [main, master, customlanding]
  workflow_dispatch:
    inputs:
      workspace:
        description: 'VTEX Workspace to deploy to'
        required: true
        default: 'master'
        type: choice
        options:
          - master
          - customlanding
          - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install VTEX Toolbelt
        run: npm install -g vtex@latest

      - name: Determine workspace
        id: workspace
        run: |
          # Priorizar workflow_dispatch sobre branch
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            WORKSPACE="${{ github.event.inputs.workspace }}"
          else
            # Para push automáticos, determinar por branch
            if [[ "${{ github.ref }}" == "refs/heads/customlanding" ]]; then
              WORKSPACE="customlanding"
            else
              WORKSPACE="master"
            fi
          fi
          
          echo "workspace=${WORKSPACE}" >> $GITHUB_OUTPUT
          echo "Selected workspace: ${WORKSPACE}"

      - name: Login to VTEX
        uses: vtex/action-toolbelt@v3
        with:
          account: ${{ secrets.VTEX_ACCOUNT }}
          appKey: ${{ secrets.VTEX_APP_KEY }}
          appToken: ${{ secrets.VTEX_APP_TOKEN }}
          workspace: ${{ steps.workspace.outputs.workspace }}
          authenticate: true

      - name: Deploy or Release to workspace
        run: |
          echo "Branch: ${{ github.ref_name }}"
          echo "Workspace: ${{ steps.workspace.outputs.workspace }}"
          
          if [[ "${{ steps.workspace.outputs.workspace }}" == "master" ]]; then
            echo "🚀 Deploying to production workspace: master"
            vtex deploy --yes
            
          elif [[ "${{ steps.workspace.outputs.workspace }}" == "customlanding" ]] || [[ "${{ steps.workspace.outputs.workspace }}" == "develop" ]]; then
            echo "📦 Publishing to development workspace: ${{ steps.workspace.outputs.workspace }}"
            # Usar deploy en lugar de link para entornos no productivos
            vtex deploy --yes --workspace ${{ steps.workspace.outputs.workspace }}
          fi
          
      - name: Verify deployment
        run: |
          echo "✅ Deployment completed!"
          echo "🔗 Store URL: https://${{ steps.workspace.outputs.workspace }}--${{ secrets.VTEX_ACCOUNT }}.myvtex.com"
          
          # Mostrar información del workspace
          vtex workspace info
