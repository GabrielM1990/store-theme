name: Deploy VTEX Theme

on:
  push:
    branches: [main, master, customlanding]
  workflow_dispatch:
    inputs:
      workspace:
        description: 'VTEX Workspace to deploy to'
        required: true
        default: 'master'
        type: choice
        options:
          - master
          - customlanding
          - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install VTEX Toolbelt
        run: npm install -g vtex@latest

      - name: Determine workspace from branch
        id: workspace
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/customlanding" ]]; then
            echo "workspace=customlanding" >> $GITHUB_OUTPUT
          else
            echo "workspace=master" >> $GITHUB_OUTPUT
          fi
          
      - name: Login to VTEX
        uses: vtex/action-toolbelt@v3
        with:
          account: ${{ secrets.VTEX_ACCOUNT }}
          appKey: ${{ secrets.VTEX_APP_KEY }}
          appToken: ${{ secrets.VTEX_APP_TOKEN }}
          workspace: ${{ steps.workspace.outputs.workspace }}
          authenticate: true

      - name: Generate unique version
        id: version
        run: |
          # Leer versión base del manifest.json
          BASE_VERSION=$(node -p "require('./manifest.json').version")
          
          # Extraer versión mayor (sin timestamp)
          CLEAN_VERSION=$(echo $BASE_VERSION | cut -d'-' -f1)
          
          # Incrementar patch version (5.2.1 -> 5.2.2)
          MAJOR=$(echo $CLEAN_VERSION | cut -d'.' -f1)
          MINOR=$(echo $CLEAN_VERSION | cut -d'.' -f2)
          PATCH=$(echo $CLEAN_VERSION | cut -d'.' -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_BASE_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          
          # Generar timestamp
          TIMESTAMP=$(date +'%Y%m%d%H%M%S')
          
          # Versión final para el deploy
          if [[ "${{ steps.workspace.outputs.workspace }}" == "master" ]]; then
            FINAL_VERSION="${NEW_BASE_VERSION}"
          else
            FINAL_VERSION="${NEW_BASE_VERSION}-${TIMESTAMP}"
          fi
          
          echo "unique_version=${FINAL_VERSION}" >> $GITHUB_OUTPUT
          echo "base_version=${NEW_BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "📌 New version: ${FINAL_VERSION}"
          
          # Actualizar manifest.json
          node -e "const fs = require('fs'); const manifest = JSON.parse(fs.readFileSync('./manifest.json', 'utf8')); manifest.version = '${NEW_BASE_VERSION}'; fs.writeFileSync('./manifest.json', JSON.stringify(manifest, null, 2));"
          
          echo "✅ manifest.json updated to base version: ${NEW_BASE_VERSION}"

      - name: Publish and Deploy
        run: |
          echo "Branch: ${{ github.ref_name }}"
          echo "Workspace: ${{ steps.workspace.outputs.workspace }}"
          echo "Version: ${{ steps.version.outputs.unique_version }}"
          
          # Cambiar al workspace
          echo "y" | vtex workspace use ${{ steps.workspace.outputs.workspace }}
          
          # Publicar la app (usando la versión única)
          vtex publish --yes
          
          # Deployar al workspace
          vtex deploy --yes
